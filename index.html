<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anime 67 Character Pack</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0c0d;
        --panel: #17191c;
        --panel-2: #202328;
        --text: #f4f6f8;
        --muted: #a7b0bb;
        --line: #323842;
        --accent: #e8f05f;
        --accent-text: #161704;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .page {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        border-bottom: 1px solid var(--line);
        background: rgba(23, 25, 28, 0.96);
        padding: 16px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .title {
        min-width: 0;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      p {
        margin: 5px 0 0;
        color: var(--muted);
        line-height: 1.45;
        font-size: 14px;
      }

      .repo-link {
        flex: 0 0 auto;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
        color: var(--text);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 9px 12px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 700;
      }

      .comparison-grid {
        min-width: 0;
        padding: 16px;
        display: grid;
        grid-template-columns: repeat(3, minmax(260px, 1fr));
        gap: 14px;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(0deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          #101214;
        background-size: 44px 44px;
      }

      .model-panel {
        min-width: 0;
        min-height: calc(100vh - 126px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(23, 25, 28, 0.9);
        overflow: hidden;
        display: grid;
        grid-template-rows: auto minmax(430px, 1fr) auto;
      }

      .model-head {
        min-height: 68px;
        border-bottom: 1px solid var(--line);
        padding: 12px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .model-name {
        display: grid;
        gap: 3px;
        min-width: 0;
      }

      .model-name strong {
        font-size: 15px;
        line-height: 1.2;
      }

      .model-name span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.3;
      }

      .badge {
        flex: 0 0 auto;
        border-radius: 999px;
        background: var(--accent);
        color: var(--accent-text);
        padding: 5px 8px;
        font-size: 11px;
        font-weight: 800;
      }

      model-viewer {
        width: 100%;
        height: 100%;
        min-height: 430px;
        background: #101214;
        --poster-color: transparent;
      }

      .model-foot {
        min-height: 48px;
        border-top: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
      }

      .status {
        min-width: 0;
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .download {
        flex: 0 0 auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
        color: var(--text);
        padding: 7px 10px;
        text-decoration: none;
        font-size: 12px;
        font-weight: 800;
      }

      @media (max-width: 1180px) {
        .comparison-grid {
          grid-template-columns: repeat(2, minmax(260px, 1fr));
        }

        .model-panel {
          min-height: 620px;
        }
      }

      @media (max-width: 680px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
          padding: 14px;
        }

        h1 {
          font-size: 20px;
        }

        .repo-link {
          width: 100%;
        }

        .comparison-grid {
          grid-template-columns: 1fr;
          padding: 12px;
        }

        .model-panel {
          min-height: 560px;
          grid-template-rows: auto minmax(390px, 1fr) auto;
        }

        model-viewer {
          min-height: 390px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <div class="title">
          <h1>Anime 67 Character Pack</h1>
          <p>Uc temiz model yan yana. Her pencerede ayri ayri dondur, zoom yap, kiyasla.</p>
        </div>
        <a class="repo-link" href="https://github.com/oscarbrendonn/anime-67-friend-pack">GitHub</a>
      </header>

      <section class="comparison-grid" aria-label="Yan yana 3D model karsilastirma">
        <article class="model-panel">
          <div class="model-head">
            <div class="model-name">
              <strong>Versiyon 7</strong>
              <span>Back flat temiz 4K output</span>
            </div>
          </div>
          <model-viewer
            src="KARAKTER_4K_v7_BACK_FLAT.glb"
            camera-controls
            auto-rotate
            auto-rotate-delay="0"
            shadow-intensity="0.8"
            exposure="1"
            environment-image="neutral"
            interaction-prompt="auto"
            camera-orbit="0deg 75deg 3.2m"
            min-camera-orbit="auto auto 1.4m"
            max-camera-orbit="auto auto 8m">
          </model-viewer>
          <div class="model-foot">
            <span class="status">Yukleniyor...</span>
            <a class="download" href="KARAKTER_4K_v7_BACK_FLAT.glb" download>GLB indir</a>
          </div>
        </article>

        <article class="model-panel">
          <div class="model-head">
            <div class="model-name">
              <strong>Versiyon 8</strong>
              <span>Back flat temiz 4K output</span>
            </div>
          </div>
          <model-viewer
            src="KARAKTER_4K_v8_BACK_FLAT.glb"
            camera-controls
            auto-rotate
            auto-rotate-delay="0"
            shadow-intensity="0.8"
            exposure="1"
            environment-image="neutral"
            interaction-prompt="auto"
            camera-orbit="0deg 75deg 3.2m"
            min-camera-orbit="auto auto 1.4m"
            max-camera-orbit="auto auto 8m">
          </model-viewer>
          <div class="model-foot">
            <span class="status">Yukleniyor...</span>
            <a class="download" href="KARAKTER_4K_v8_BACK_FLAT.glb" download>GLB indir</a>
          </div>
        </article>

        <article class="model-panel">
          <div class="model-head">
            <div class="model-name">
              <strong>Versiyon 9</strong>
              <span>Back flat temiz 4K output</span>
            </div>
          </div>
          <model-viewer
            src="KARAKTER_4K_v9_BACK_FLAT.glb"
            camera-controls
            auto-rotate
            auto-rotate-delay="0"
            shadow-intensity="0.8"
            exposure="1"
            environment-image="neutral"
            interaction-prompt="auto"
            camera-orbit="0deg 75deg 3.2m"
            min-camera-orbit="auto auto 1.4m"
            max-camera-orbit="auto auto 8m">
          </model-viewer>
          <div class="model-foot">
            <span class="status">Yukleniyor...</span>
            <a class="download" href="KARAKTER_4K_v9_BACK_FLAT.glb" download>GLB indir</a>
          </div>
        </article>
      </section>
    </main>

    <script>
      document.querySelectorAll("model-viewer").forEach((viewer) => {
        const status = viewer.closest(".model-panel").querySelector(".status");

        viewer.addEventListener("load", () => {
          status.textContent = "Hazir: dondur ve yakinlas.";
        });

        viewer.addEventListener("error", () => {
          status.textContent = "Yuklenemedi. GLB indirip kontrol et.";
        });
      });
    </script>
  </body>
</html>
